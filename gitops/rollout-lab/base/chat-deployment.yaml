apiVersion: apps/v1
kind: Deployment
metadata:
  name: zzupzzup-chat
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zzupzzup-chat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: zzupzzup-chat
    spec:
      imagePullSecrets:
      - name: ecr-regcred
      terminationGracePeriodSeconds: 1
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: zzupzzup-chat
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: zzupzzup-chat
      containers:
      - name: app
        image: 966000660350.dkr.ecr.ap-northeast-2.amazonaws.com/zzupzzup-chat:0.1
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          protocol: TCP
