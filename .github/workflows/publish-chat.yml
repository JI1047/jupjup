name: Publish jupjup-chat image

on:
  push:
    branches:
      - main
    paths:
      - "jupjup-chat/**"
      - ".github/workflows/publish-chat.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: zzupzzup-chat
  IMAGE_CONTEXT: ./jupjup-chat

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: github-actions-jupjup-chat-publish

      - name: Set image metadata
        shell: bash
        run: |
          set -euo pipefail

          aws_account_id="$(aws sts get-caller-identity --query Account --output text)"
          ecr_registry="${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          image_uri="${ecr_registry}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          image_latest="${ecr_registry}/${ECR_REPOSITORY}:0.1"

          {
            echo "AWS_ACCOUNT_ID=${aws_account_id}"
            echo "ECR_REGISTRY=${ecr_registry}"
            echo "IMAGE_URI=${image_uri}"
            echo "IMAGE_LATEST=${image_latest}"
          } >> "$GITHUB_ENV"

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws ecr describe-repositories --region "$AWS_REGION" --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1; then
            aws ecr create-repository \
              --region "$AWS_REGION" \
              --repository-name "$ECR_REPOSITORY" >/dev/null
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        shell: bash
        run: |
          set -euo pipefail

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker buildx build \
            --platform linux/arm64 \
            -t "$IMAGE_URI" \
            -t "$IMAGE_LATEST" \
            --push \
            "$IMAGE_CONTEXT"
