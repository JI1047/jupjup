name: Deploy to jubjub-server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: jubjub-backend
  CONTAINER_NAME: jubjub-backend
  REMOTE_IMAGE_TAR: /tmp/jubjub-backend.tar
  REMOTE_ENV_FILE: /home/ubuntu/apps/jupjup-monitoring-backend/.env
  REMOTE_DOCKER_NETWORK: jupjup-monitoring-backend_monitoring
  REMOTE_APP_DIR: /home/ubuntu/apps/jupjup-monitoring-backend
  LEGACY_CONTAINER_NAME: integrated-login-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build Spring Boot jar
        run: ./gradlew bootJar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 Docker image tar
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          outputs: type=docker,dest=${{ env.IMAGE_NAME }}.tar

      - name: Configure SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$EC2_SSH_KEY" > ~/.ssh/jubjub.pem
          chmod 600 ~/.ssh/jubjub.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload image to EC2
        run: |
          scp -i ~/.ssh/jubjub.pem $IMAGE_NAME.tar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:$REMOTE_IMAGE_TAR

      - name: Deploy container on EC2
        run: |
          ssh -i ~/.ssh/jubjub.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            git config --global --add safe.directory $REMOTE_APP_DIR
            cd $REMOTE_APP_DIR
            git checkout main
            git pull --ff-only origin main

            docker load -i $REMOTE_IMAGE_TAR
            docker stop $LEGACY_CONTAINER_NAME || true
            docker rm $LEGACY_CONTAINER_NAME || true
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              --network $REMOTE_DOCKER_NETWORK \
              --env-file $REMOTE_ENV_FILE \
              -e SPRING_PROFILES_ACTIVE=docker \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -p 8080:8080 \
              $IMAGE_NAME:${{ github.sha }}

            for i in {1..18}; do
              if curl --fail --silent http://localhost:8080/actuator/health > /dev/null; then
                break
              fi

              if [ "$i" -eq 18 ]; then
                docker logs --tail 200 $CONTAINER_NAME
                exit 1
              fi

              sleep 5
            done
            rm -f $REMOTE_IMAGE_TAR
          EOF
