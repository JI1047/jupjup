name: Deploy to jubjub-server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  EC2_INSTANCE_ID: i-08968f306a871d2a4
  REMOTE_APP_DIR: /home/ubuntu/apps/jupjup-monitoring-backend
  DEPLOY_HEALTHCHECK_URL: http://localhost:8080/actuator/health

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: github-actions-jubjub-deploy

      - name: Deploy via SSM
        shell: bash
        run: |
          set -euo pipefail

          cat > ssm-parameters.json <<EOF
          {
            "commands": [
              "git config --global --add safe.directory '${REMOTE_APP_DIR}'",
              "cd '${REMOTE_APP_DIR}'",
              "git fetch origin main",
              "git checkout main",
              "git pull --ff-only origin main",
              "DEPLOY_HEALTHCHECK_URL='${DEPLOY_HEALTHCHECK_URL}' bash ./deploy_remote.sh"
            ]
          }
          EOF

          command_id="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy ${GITHUB_SHA} from GitHub Actions" \
              --parameters "file://ssm-parameters.json" \
              --cloud-watch-output-config "CloudWatchOutputEnabled=true" \
              --timeout-seconds 3600 \
              --query "Command.CommandId" \
              --output text
          )"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID"
          wait_exit_code=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json > command-result.json

          cat command-result.json

          export WAIT_EXIT_CODE="$wait_exit_code"
          python - <<'PY'
          import json
          from pathlib import Path
          import os

          result = json.loads(Path("command-result.json").read_text())
          wait_exit_code = int(os.environ["WAIT_EXIT_CODE"])
          if wait_exit_code != 0 or result["Status"] != "Success":
              raise SystemExit(
                  f"SSM deployment failed: waiter_exit={wait_exit_code}, status={result['Status']}"
              )
          PY
