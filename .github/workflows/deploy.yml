name: Deploy to jubjub-server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  EC2_INSTANCE_ID: i-08968f306a871d2a4
  REMOTE_APP_DIR: /home/ubuntu/apps/jupjup-monitoring-backend
  DEPLOY_HEALTHCHECK_URL: http://localhost:8080/actuator/health
  ECR_REPOSITORY: integrated-login-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: github-actions-jubjub-deploy

      - name: Set image metadata
        shell: bash
        run: |
          set -euo pipefail

          aws_account_id="$(aws sts get-caller-identity --query Account --output text)"
          ecr_registry="${aws_account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          image_uri="${ecr_registry}/${ECR_REPOSITORY}:${GITHUB_SHA}"

          {
            echo "AWS_ACCOUNT_ID=${aws_account_id}"
            echo "ECR_REGISTRY=${ecr_registry}"
            echo "IMAGE_URI=${image_uri}"
          } >> "$GITHUB_ENV"

      - name: Build application JAR
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Ensure ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws ecr describe-repositories --region "$AWS_REGION" --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1; then
            aws ecr create-repository \
              --region "$AWS_REGION" \
              --repository-name "$ECR_REPOSITORY" >/dev/null
          fi

      - name: Build and push Docker image
        shell: bash
        run: |
          set -euo pipefail

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy via SSM
        shell: bash
        run: |
          set -euo pipefail

          compose_b64="$(base64 -w 0 docker-compose.deploy.yml)"
          deploy_script_b64="$(base64 -w 0 deploy_remote.sh)"
          ecr_login_password="$(aws ecr get-login-password --region "$AWS_REGION")"

          cat > ssm-parameters.json <<EOF
          {
            "commands": [
              "set -eu",
              "mkdir -p '${REMOTE_APP_DIR}'",
              "printf '%s' '${compose_b64}' | base64 -d > '${REMOTE_APP_DIR}/docker-compose.deploy.yml'",
              "printf '%s' '${deploy_script_b64}' | base64 -d > '${REMOTE_APP_DIR}/deploy_remote.sh'",
              "chmod +x '${REMOTE_APP_DIR}/deploy_remote.sh'",
              "printf '%s' '${ecr_login_password}' | sudo docker login --username AWS --password-stdin '${ECR_REGISTRY}'",
              "APP_DIR='${REMOTE_APP_DIR}' COMPOSE_FILE='docker-compose.deploy.yml' APP_IMAGE='${IMAGE_URI}' DEPLOY_HEALTHCHECK_URL='${DEPLOY_HEALTHCHECK_URL}' bash '${REMOTE_APP_DIR}/deploy_remote.sh'"
            ]
          }
          EOF

          command_id="$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy ${GITHUB_SHA} from GitHub Actions" \
              --parameters "file://ssm-parameters.json" \
              --cloud-watch-output-config "CloudWatchOutputEnabled=true" \
              --timeout-seconds 3600 \
              --query "Command.CommandId" \
              --output text
          )"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID"
          wait_exit_code=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$command_id" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json > command-result.json

          cat command-result.json

          export WAIT_EXIT_CODE="$wait_exit_code"
          python - <<'PY'
          import json
          from pathlib import Path
          import os

          result = json.loads(Path("command-result.json").read_text())
          wait_exit_code = int(os.environ["WAIT_EXIT_CODE"])
          if wait_exit_code != 0 or result["Status"] != "Success":
              raise SystemExit(
                  f"SSM deployment failed: waiter_exit={wait_exit_code}, status={result['Status']}"
              )
          PY
