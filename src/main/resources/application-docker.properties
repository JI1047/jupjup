# ======= ?????? ?? =======
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:40}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.pool-name=DoktoriHikariPool


spring.sql.init.mode=always

# ======= JPA ?? =======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ======= ?? ?? (??) =======
server.port=8080



# ??? OAuth2
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:dummy-naver-client-id}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:dummy-naver-client-secret}
spring.security.oauth2.client.registration.naver.redirect-uri=http://13.209.202.27:8080/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code

# ??? OAuth2
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:dummy-kakao-client-id}
spring.security.oauth2.client.registration.kakao.redirect-uri=http://13.209.202.27:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code



spring.jwt.secret=${JWT_SECRET}

# Redis cache
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# Cache TTL
app.cache.ttl-days=${CACHE_TTL_DAYS:7}
app.cache.lock-wait-seconds=${CACHE_LOCK_WAIT_SECONDS:3}
app.cache.lock-lease-seconds=${CACHE_LOCK_LEASE_SECONDS:5}

# Scheduler
app.scheduler.points-refresh-cron=${POINTS_REFRESH_CRON:0 0 3 * * *}
app.scheduler.items-refresh-cron=${ITEMS_REFRESH_CRON:0 30 3 * * *}



