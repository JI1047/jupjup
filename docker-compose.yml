services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: integrated-login-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_TTL_DAYS: ${CACHE_TTL_DAYS:-7}
      POINTS_REFRESH_CRON: ${POINTS_REFRESH_CRON:-0 0 3 * * *}
      ITEMS_REFRESH_CRON: ${ITEMS_REFRESH_CRON:-0 30 3 * * *}
    ports:
      - "8081:8080"
    depends_on:
      - redis
    networks:
      - monitoring

  redis:
    image: redis:7-alpine
    container_name: integrated-login-redis
    ports:
      - "6379:6379"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: integrated-login-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: integrated-login-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring

volumes:
  grafana-data:

networks:
  monitoring:
